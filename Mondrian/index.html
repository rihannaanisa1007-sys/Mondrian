<!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8">
            <title>Piet Mondrian</title>
            <style>
                .container {
                display: inline-grid;
                grid-template-columns: 30px 100px auto;
                grid-template-rows: 55px 55px 15px 15px;
                background-color: white;
                border: 2px solid #000000;
                 padding: 5px;
                }
                
                .container div {
                background-color: #ffffff;
                border: 2px solid black;
                padding: 5px;
                }

                .item1{
            	grid-column-start: 2;
                grid column-end: 3;
                grid-row-start: 1;
                grid-row-end: 3; 
                }

                .item2{
	            grid-row-start: 3;
                grid-row-end: 5;
                }

                img{
                    display: block;
                    margin-top: 20px;
                }
                
            </style>
        </head>

    <body>
        <div class="container">
            <div class="item1" style="background-color: red; border: solid red;"></div>
            <div></div>
            <div style="background-color: red; border: solid red;"></div>
            <div></div>  
            <div style="background-color: red; border: solid red;"></div>
            <div class="item2" style="background-color: blue;"></div>
            <div class="item2"></div>
            <div></div>
            <div style="background-color: yellow;"></div>
        </div>

        <img src="https://ideelart.com/cdn/shop/articles/the-power-of-piet-mondrians-composition-with-red-blue-and-yellow-6874999.jpg?v=1773090262" alt="Reference Image" width="200" height="auto">
        <p>Reference Image</p>
    </body>
</html>
